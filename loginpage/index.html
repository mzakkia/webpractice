<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <title>Glassmorphism Sign Up Form</title>
    <link rel="stylesheet" href="form.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
</html>

<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo"><i class="fa-solid fa-circle-notch"></i></div>  
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
      </ul>
      <div class="nav-right">
        <div class="search-box">
            <i class ="fa-solid fa-magnifying-glass"></i>
            <span>Search</span>
        </div>
        <i class="fa-regular fa-user user-icon"></i>
        <i class=""fa-solid fa-gear gear-icon"></i>
      </div>
    </nav>
    <div class="glass-form">
        <h2>Sign Up</h2>
        <p class="subtitle">Already a member?<a href="#">Log in</a></p>

        <form>
            <div class="input-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" required>
            </div>
            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="divider">
            <span>or sign up with</span>
        </div>
        <div class="social-icons">
            <a href="#" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="google"><i class="fa-brands fa-google"></i></a>
        </div>
    </div>
  </div>
</body>
</html>
